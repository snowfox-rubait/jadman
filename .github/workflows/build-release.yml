name: Build & Package Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build - Linux x86_64
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: x86_64-unknown-linux-gnu

    - name: Compile Daemon & TUI
      run: cargo build --release --target x86_64-unknown-linux-gnu

    - name: Package Release Assets
      id: package
      run: |
        mkdir -p dist
        tar -czf dist/jadman-x86_64-unknown-linux-gnu.tar.gz -C target/x86_64-unknown-linux-gnu/release jadm-daemon jadm-tui
        echo "asset_path=dist/jadman-x86_64-unknown-linux-gnu.tar.gz" >> $GITHUB_OUTPUT
        echo "asset_name=jadman-x86_64-unknown-linux-gnu.tar.gz" >> $GITHUB_OUTPUT
      shell: bash

    - name: Upload Artifacts (Build)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.package.outputs.asset_name }}
        path: ${{ steps.package.outputs.asset_path }}

  release:
    name: Create Code Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Flatten Artifacts Directory
      run: |
        mkdir -p release-assets
        find artifacts -type f -exec cp {} release-assets/ \;
        ls -la release-assets

    - name: Create Release Page
      uses: softprops/action-gh-release@v1
      with:
        files: release-assets/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
