<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Save with JADMan</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0f0f11;
    --card-bg: #18181c;
    --primary: #00ff66;
    --primary-hover: #00cc52;
    --text-white: #f5f5f7;
    --text-gray: #86868b;
    --border-color: rgba(255, 255, 255, 0.08);
  }

  body { 
    font-family: 'Outfit', sans-serif; 
    padding: 16px; 
    margin: 0;
    background: var(--bg-dark);
    color: var(--text-white);
    box-sizing: border-box;
    width: 450px;
    overflow-x: hidden;
  }
  h3 { 
    margin: 0 0 16px 0; 
    font-size: 18px;
    font-weight: 800;
  }
  h3 span {
    color: var(--primary);
  }
  label { 
    display: block; 
    margin-top: 12px; 
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-gray);
    letter-spacing: 0.5px;
  }
  input, select { 
    width: 100%; 
    box-sizing: border-box; 
    margin-top: 6px; 
    padding: 10px; 
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-white);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    outline: none;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    transition: border-color 0.2s;
  }
  input:focus, select:focus {
    border-color: var(--primary);
  }
  select option {
    background-color: var(--card-bg);
    color: var(--text-white);
  }
  .actions { 
    margin-top: 24px; 
    display: flex; 
    justify-content: flex-end; 
    gap: 12px; 
  }
  button { 
    padding: 10px 20px; 
    background: var(--primary);
    color: #000;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.2s;
  }
  button.cancel { 
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-white);
    border: 1px solid var(--border-color);
  }
  button.cancel:hover {
    background: rgba(255, 255, 255, 0.1);
  }
  button:hover { 
    opacity: 0.95;
    box-shadow: 0 4px 12px rgba(0, 255, 102, 0.15);
  }
  
  .checkbox-grid {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    font-size: 13px;
    cursor: pointer;
  }

  .checkbox-item input {
    width: auto;
    margin: 0 10px 0 0;
  }
</style>
</head>
<body>
  <h3>📥 Download with <span>JADMan</span></h3>
  
  <label for="url">Target URL:</label>
  <input type="text" id="url" readonly />
  
  <label for="folder">Destination Directory:</label>
  <input type="text" id="folder" value="/home/rubait/Downloads" />
  
  <label for="quality" id="qualityLabel">Quality (Scanning formats...):</label>
  <select id="quality">
    <option value="">Best Quality (Default)</option>
  </select>
  <div id="status" style="font-size: 11px; margin-top: 5px; color: var(--text-gray);"></div>

  <div class="checkbox-grid">
    <label class="checkbox-item">
      <input type="checkbox" id="writeSubs" />
      Download Subtitles (Auto/Embedded)
    </label>
    <label class="checkbox-item">
      <input type="checkbox" id="embedThumbnail" />
      Embed Video Thumbnail
    </label>
    <label class="checkbox-item">
      <input type="checkbox" id="embedChapters" />
      Embed Video Chapters
    </label>
    <label class="checkbox-item" id="playlistOptionWrap" style="display: none;">
      <input type="checkbox" id="downloadPlaylist" />
      Download Entire Playlist
    </label>
    <label class="checkbox-item">
      <input type="checkbox" id="compressVideo" />
      Compress Video (H.264 MP4 conversion)
    </label>
  </div>
  
  <div class="actions">
    <button id="cancelBtn" class="cancel">Cancel</button>
    <button id="downloadBtn">Start Download</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
