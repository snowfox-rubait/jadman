<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Save with JADMan</title>
<style>
  body { 
    font-family: sans-serif; 
    padding: 15px; 
    margin: 0;
    background: #222;
    color: #eee;
  }
  h3 { margin-top: 0; }
  label { display: block; margin-top: 10px; font-size: 14px; }
  input { 
    width: 100%; 
    box-sizing: border-box; 
    margin-top: 5px; 
    padding: 8px; 
    background: #333;
    color: #fff;
    border: 1px solid #555;
    border-radius: 4px;
  }
  .actions { 
    margin-top: 20px; 
    display: flex; 
    justify-content: flex-end; 
    gap: 10px; 
  }
  button { 
    padding: 8px 15px; 
    background: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button.cancel { background: #555; }
  button:hover { opacity: 0.9; }
</style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 8px 12px; background: #222; border-radius: 6px; border: 1px solid #444;">
    <span id="statusLabel" style="font-weight: bold; font-size: 13px; color: #00ff88; font-family: sans-serif;">🟢 JADMan Active</span>
    <button id="toggleActiveBtn" style="padding: 4px 10px; font-size: 11px; background: #ff3333; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: sans-serif;">Pause</button>
  </div>

  <h3>Download with JADMan</h3>
  
  <label for="url">URL:</label>
  <input type="text" id="url" readonly />
  
  <label for="mode">Download Mode:</label>
  <select id="mode" style="width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; margin-top: 5px;">
    <option value="general">General Mode (Lightweight, anonymous)</option>
    <option value="siphon" selected>Siphon Mode (Medium, cookie & hooks)</option>
    <option value="ghost">Ghost Mode (Anti-bot, browser impersonate)</option>
  </select>

  <!-- Ghost Engine: only shown when Ghost mode is active -->
  <div id="ghostEngineWrap" style="display:none; margin-top: 8px;">
    <label for="ghostEngine" style="font-size: 12px; color: #aaa; margin-top: 0;">Ghost Engine:</label>
    <select id="ghostEngine" style="width: 100%; padding: 8px; background: #1a1a2e; color: #00ff88; border: 1px solid #00ff44; border-radius: 4px; margin-top: 4px; font-weight: bold;">
      <option value="chrome_native">⚡ Chrome Native (Real Browser TLS — Best for Cloudflare)</option>
      <option value="browser_fetch">🌐 Browser Fetch (In-Tab Streaming — Zero-Trust Bypass)</option>
      <option value="debugger_capture">🪲 Debugger Capture (Direct Active-Socket Intercept)</option>
      <option value="webgl_capture">🎨 WebGL Canvas Capture (Bypass for Wasm Rendering)</option>
      <option value="ytdlp">🔧 yt-dlp Impersonate (Transcoding / Platform extractors)</option>
      <option value="camoufox">🦊 Camoufox Headless (Stealth browser fallback)</option>
    </select>
  </div>
  
  <label for="folder">Save to folder:</label>
  <input type="text" id="folder" value="/home/rubait/Downloads" />
  
  <label for="quality" id="qualityLabel">Quality (Detecting...):</label>
  <select id="quality" style="width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; margin-top: 5px;">
    <option value="">Best (Default)</option>
  </select>
  <div id="status" style="font-size: 12px; margin-top: 5px; color: #aaa;"></div>

  <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
    <label style="display: flex; align-items: center; margin-top: 0; font-size: 13px; cursor: pointer;">
      <input type="checkbox" id="writeSubs" style="width: auto; margin: 0 8px 0 0;" />
      Download Subtitles (Auto/Embedded)
    </label>
    <label style="display: flex; align-items: center; margin-top: 0; font-size: 13px; cursor: pointer;">
      <input type="checkbox" id="embedThumbnail" style="width: auto; margin: 0 8px 0 0;" />
      Embed Video Thumbnail
    </label>
    <label style="display: flex; align-items: center; margin-top: 0; font-size: 13px; cursor: pointer;">
      <input type="checkbox" id="embedChapters" style="width: auto; margin: 0 8px 0 0;" />
      Embed Video Chapters (Timeframes)
    </label>
    <label style="display: flex; align-items: center; margin-top: 0; font-size: 13px; cursor: pointer;">
      <input type="checkbox" id="liveSupport" style="width: auto; margin: 0 8px 0 0;" />
      Live Video Support (Streaming TUI view)
    </label>
    <label style="display: flex; align-items: center; margin-top: 0; font-size: 13px; cursor: pointer; display: none;" id="playlistOptionWrap">
      <input type="checkbox" id="downloadPlaylist" style="width: auto; margin: 0 8px 0 0;" />
      Download Entire Playlist
    </label>
    <label style="display: flex; align-items: center; margin-top: 0; font-size: 13px; cursor: pointer;">
      <input type="checkbox" id="liveFromStart" style="width: auto; margin: 0 8px 0 0;" />
      Download Live from Start of Stream
    </label>
    <div id="liveFromStartWarning" style="color: #e0a800; font-size: 11px; margin-top: 4px; margin-left: 20px; display: none; line-height: 1.3;">
      ⚠️ Warning: Enabling this on live streams longer than 8 hours will cause issues (incomplete downloads, sync bugs, and disk space management trouble).
    </div>
    <label style="display: flex; align-items: center; margin-top: 4px; font-size: 13px; cursor: pointer;">
      <input type="checkbox" id="compressVideo" style="width: auto; margin: 0 8px 0 0;" />
      Compress Video (smaller size / H.264)
    </label>
    <label style="display: flex; align-items: center; margin-top: 4px; font-size: 13px; cursor: pointer;">
      <input type="checkbox" id="recordSegments" style="width: auto; margin: 0 8px 0 0;" />
      Record Media Streams (Siphon Segment Recorder)
    </label>
  </div>
  
  <div class="actions">
    <button id="cancelBtn" class="cancel">Cancel</button>
    <button id="downloadBtn">Start Download</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
