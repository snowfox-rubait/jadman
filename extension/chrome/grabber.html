<!DOCTYPE html>
<html>
<head>
  <title>JADMan Grabber</title>
  <style>
    body {
      background: #121212;
      color: #e0e0e0;
      font-family: sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      padding: 15px;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .filter-bar {
      padding: 10px 15px;
      background: #1a1a1a;
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      background: #333;
      border: 1px solid #444;
      color: white;
      padding: 5px 10px;
      border-radius: 4px;
      flex: 1;
    }
    .list-container {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }
    .link-item {
      padding: 8px 15px;
      border-bottom: 1px solid #252525;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .link-item:hover {
      background: #222;
    }
    .link-url {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      color: #aaa;
    }
    .link-name {
      font-weight: bold;
      width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .footer {
      padding: 15px;
      background: #1e1e1e;
      border-top: 1px solid #333;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-primary {
      background: #ff0000;
      color: white;
    }
    .btn-secondary {
      background: #444;
      color: white;
    }
    #stats {
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>Batch Download Grabber</span>
    <div id="stats">Found 0 links</div>
  </div>
  <div class="filter-bar">
    <input type="text" id="extensionFilter" placeholder="Filter by extension (e.g. .mp3, .pdf)">
    <button class="btn-secondary" id="selectAll">Select All</button>
    <button class="btn-secondary" id="selectNone">None</button>
  </div>
  <div id="grabberSettings" style="padding: 15px; background: #161616; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 10px;">
    <div style="display: flex; gap: 10px; align-items: center;">
      <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
        <label for="folder" style="font-size: 12px; color: #aaa;">Destination Directory:</label>
        <input type="text" id="folder" value="/home/rubait/Downloads" style="padding: 6px; background: #262626; border: 1px solid #444; border-radius: 4px; color: #fff; font-size: 13px;" />
      </div>
      <div style="width: 180px; display: flex; flex-direction: column; gap: 4px;">
        <label for="mode" style="font-size: 12px; color: #aaa;">Download Mode:</label>
        <select id="mode" style="padding: 6px; background: #262626; border: 1px solid #444; border-radius: 4px; color: #fff; font-size: 13px;">
          <option value="general">General (aria2c)</option>
          <option value="siphon">Siphon Mode</option>
          <option value="ghost">Ghost Bypass Mode</option>
        </select>
      </div>
      <div id="ghostEngineWrap" style="width: 220px; display: none; flex-direction: column; gap: 4px;">
        <label for="ghostEngine" style="font-size: 12px; color: #aaa;">Ghost Bypass Engine:</label>
        <select id="ghostEngine" style="padding: 6px; background: #262626; border: 1px solid #444; border-radius: 4px; color: #fff; font-size: 13px;">
          <option value="chrome_native">⚡ Chrome Native Downloader</option>
          <option value="browser_fetch">🌐 Browser Fetch (In-Tab)</option>
          <option value="debugger_capture">🪲 Debugger Capture</option>
          <option value="webgl_capture">🎨 WebGL Canvas Capture</option>
          <option value="ytdlp">🔧 yt-dlp Impersonate</option>
          <option value="camoufox">🦊 Camoufox Stealth</option>
        </select>
      </div>
    </div>
    
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 5px;">
      <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
        <input type="checkbox" id="writeSubs" /> Subtitles
      </label>
      <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
        <input type="checkbox" id="embedThumbnail" /> Embed Thumbnail
      </label>
      <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
        <input type="checkbox" id="embedChapters" /> Embed Chapters
      </label>
      <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
        <input type="checkbox" id="compressVideo" /> Compress Video (FFmpeg)
      </label>
      <label id="liveSupportWrap" style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
        <input type="checkbox" id="liveSupport" /> Live Stream Support
      </label>
      <div id="liveFromStartWrap" style="display: none; align-items: center; gap: 6px; grid-column: span 3;">
        <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
          <input type="checkbox" id="liveFromStart" /> Download from start
        </label>
        <span id="liveFromStartWarning" style="display: none; color: #ff9900; font-size: 11px;">⚠️ Warning: Heavy bandwidth/time</span>
      </div>
    </div>
  </div>

  <div class="list-container" id="linkList">
    <!-- Links will be injected here -->
  </div>
  <div class="footer">
    <button class="btn-secondary" id="cancelBtn">Cancel</button>
    <button class="btn-primary" id="downloadBtn">Download Selected</button>
  </div>
  <script src="grabber.js"></script>
</body>
</html>
